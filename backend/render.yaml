services:
  - type: web
    name: applied-jarvis-api
    runtime: python
    region: oregon
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    # IMPORTANT: must use $PORT — Render injects this; hardcoding 8000 fails
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      # Set FRONTEND_URL in the Render dashboard to your Vercel URL (no trailing slash)
      # e.g. https://applied-jarvis.vercel.app
      - key: FRONTEND_URL
        sync: false
    plan: free
